  shape: "cylinder"
  center: [0.0, 0.0, 0.0]
  limits:
    l_T: 0.6
    r_T: 0.8
    tolerance: 0.001
  stop_time: 5.0
  discretize_dockers: true
  tolerance: 0.001
  observation_error:
    ang_pos: 4.0e-8
    ang_vel: 4.0e-8

tube:
  run_tube: true
  bandwidth_0: [0.25, 0.25, 0.25]
  boundary_layer_0: [0.5, 0.5, 0.5]
  convergence_rate: [0.1, 0.1, 0.1]
  sliding_gains: [60.0, 60.0, 60.0]
  bandwidth_range:
    lower: 0.01
    upper: 10.0
