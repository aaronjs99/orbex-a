  semi_major_axis: 6678136.3
  eccentricity: 0.0
  t_periapsis: 0.0
  initial_conditions: [-50.0, 10.0, 5.0, 0.05, -0.01, 0.01]

mpc:
  horizon_steps:
    rendezvous: 80
    docking: 40
  actuation_steps:
    rendezvous: 20
    docking: 2
  state_bounds:
    - {lower: "-Inf", upper: "+Inf"}
    - {lower: "-Inf", upper: "+Inf"}
    - {lower: "-Inf", upper: "+Inf"}
    - {lower: "-Inf", upper: "+Inf"}
    - {lower: "-Inf", upper: "+Inf"}
    - {lower: "-Inf", upper: "+Inf"}
  input_bounds:
    - {lower: -0.1, upper: 0.1}
    - {lower: -0.1, upper: 0.1}
    - {lower: -0.1, upper: 0.1}
  Q: [1, 1, 1, 1, 1, 1]
  R: [0.0001, 0.0001, 0.0001]
  force_bounds:
    - {lower: -7000.0, upper: 7000.0}
    - {lower: -7000.0, upper: 7000.0}
    - {lower: -7000.0, upper: 7000.0}
  goal_bounds: [425.0, 475.0]

target:
